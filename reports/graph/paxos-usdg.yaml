    label: DEFAULT_ADMIN + SUPPLY_CONTROLLER_MANAGER

  # === Mint authority on USDG ===
  - from: sc1
    to: usdg
    kind: mints
    label: SUPPLY_CONTROLLER (500M cap)
  - from: sc2
    to: usdg
    kind: mints
    label: SUPPLY_CONTROLLER (1B cap)
  - from: oft-wrapper
    to: usdg
    kind: mints
    label: SUPPLY_CONTROLLER (45M; bridge)

  # === Supply controller registry ===
  - from: supply-control
    to: sc1
    kind: manages
    label: rate-limited
  - from: supply-control
    to: sc2
    kind: manages
    label: rate-limited
  - from: supply-control
    to: oft-wrapper
    kind: manages
    label: rate-limited

  # === External dependencies (off-chain backing + bridge) ===
  - from: usdg
    to: dep-paxos-custody
