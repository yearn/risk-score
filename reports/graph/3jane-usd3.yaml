edges:
  # === Governance flow ===
  - from: multisig
    to: timelock
    kind: proposes-on
    label: PROPOSER + EXECUTOR + CANCELLER
  - from: timelock
    to: morpho-credit
    kind: controls
    label: owner (24h delay)
  - from: timelock
    to: USD3
    kind: controls
    label: proxy admin (24h delay)
  - from: timelock
    to: protocol-config
    kind: controls
    label: owner (24h delay)
  - from: timelock
    to: credit-line
    kind: controls
    label: owner
  - from: emergency-controller
    to: morpho-credit
    kind: holds-role
    label: EMERGENCY_AUTHORIZED_ROLE (bypass timelock)

  # === Internal vault flow ===
  - from: sUSD3
    to: USD3
    kind: deposits-into
    label: "stake (85/15 yield split)"
  - from: USD3
    to: morpho-credit
    kind: deposits-into
    label: USDC supply

  # === Allocation: lending pool into strategies ===
  - from: morpho-credit
    to: aave-strategy
    kind: allocates-to
    label: "idle reserves (~56%)"
  - from: morpho-credit
    to: unsecured-loans
    kind: allocates-to
    label: "~44% utilization"

  # === Credit underwriting wiring ===
  - from: credit-line
    to: morpho-credit
    kind: manages
    label: approves credit lines
  - from: protocol-config
    to: morpho-credit
    kind: manages
    label: pause / debt cap / tranche ratios
  - from: irm
    to: morpho-credit
    kind: manages
    label: borrow rate model
  - from: helper
    to: morpho-credit
    kind: routes-through
    label: borrower entry point

  # === Strategy → external dependencies ===
  - from: aave-strategy
    to: aave-v3-usdc
    kind: deposits-into
    label: "USDC supply"
  - from: unsecured-loans
    to: borrowers
    kind: deposits-into
    label: "uncollateralized loans"
  - from: borrowers
    to: zk-tls
    kind: routes-through
    label: bank / credit-score proofs
  - from: zk-tls
    to: eigenlayer-avs
    kind: routes-through
    label: ZK proof verification
  - from: USD3
    to: insurance-fund
    kind: routes-through
    label: $1M loss buffer
