    kind: controls
    label: owner
  - from: timelock-feecalc
    to: roles-authority-feecalc
    kind: controls
    label: owner

  # === Mint authority ===
  - from: provisioner
    to: gtusda-vault
    kind: mints
    label: onlyProvisioner

  # === Capital flow: vault → bridge → Morpho ===
  - from: gtusda-vault
    to: cross-chain-bridge
    kind: routes-through
  - from: cross-chain-bridge
    to: morpho
    kind: deposits-into
    label: USDC

  # === Fee flow ===
  - from: gtusda-vault
    to: gauntlet-multisig
    kind: routes-fees-to
    label: feeRecipient
