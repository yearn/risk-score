slug: gauntlet-gusda
title: Gauntlet USD Alpha (gtUSDa) — Contract Dependency Graph
chain: ethereum

categories:
  - id: vault
    label: Vault / Token
  - id: governance
    label: Governance
  - id: infra
    label: Protocol Infra
  - id: dependency
    label: External Dependency

nodes:
  # === Vault layer ===
  - id: gtusda-vault
    label: gtUSDa Vault
    address: "0x3bd9248048df95db4fbd748c6cd99c1baa40bad0"
    category: vault
    note: MultiDepositorVault; non-proxy (immutable)

  # === Infra ===
  - id: provisioner
    label: Provisioner
    address: "0x74C4A66CE4F4779B11E7c63D42e51EEef3A80D11"
    category: infra
    note: Sole mint authority; deposit/withdrawal handler
  - id: price-fee-calculator
    label: Price & Fee Calculator
    address: "0x8F3FfA11CD5915f0E869192663b905504A2Ef4a5"
    category: infra
    note: Admin-set unit price; fee calculator
  - id: keeper-eoa
    label: Keeper EOA
    address: "0xdd998274ed12bb12d818800915cfb8f87cbc2801"
    category: infra
    note: Example offchain bot that submits unit-price updates
  - id: forwarder-accountant
    label: Forwarder Accountant
    address: "0xc219d47B645e3446b81889F18B34238310c792d0"
    category: infra
    note: Vault accountant; relays keeper PPS updates to PriceAndFeeCalculator
  - id: min-update-guard
    label: Min Update Guard
    address: "0xbfb2040d37f5da34938a367ef3ae0786fd6a861a"
    category: infra
    note: Pre-checks minimum update interval; soft guard only

  # === Governance ===
  - id: gauntlet-multisig
    label: Gauntlet Multisig (3/9)
    address: "0xCa75ab43dABD026466f8DA9CC0938eD7bDea0a6f"
    category: governance
    note: Gnosis Safe; PROPOSER_ROLE + EXECUTOR_ROLE on vault timelock; feeRecipient
  - id: timelock-vault
    label: Vault Timelock (1-day)
    address: "0x72820eA60C344186465152e4b11e260CAE391d77"
    category: governance
    note: Owner of vault, provisioner, and RolesAuthority (Vault)
  - id: timelock-feecalc
    label: FeeCalc Timelock (1-day)
    address: "0xce75E223E6DbB0503D2B6f55bC5907d1A0372E2B"
    category: governance
    note: Owner of PriceAndFeeCalculator and RolesAuthority (FeeCalc)
  - id: roles-authority-vault
    label: RolesAuthority (Vault)
    address: "0xC14604f43ED73011B60426FE6c48317d6583e67e"
    category: governance
    note: Access-control root for vault functions
  - id: roles-authority-feecalc
    label: RolesAuthority (FeeCalc)
    address: "0xA83C037DF3b27bF7224AB0a40a2c4531FF1B2f40"
    category: governance
    note: Access-control root for fee calculator

  # === External dependencies ===
  - id: cross-chain-bridge
    label: Circle CCTP v2
    address: "0xfd78ee919681417d192449715b2594ab58f5d002"
    category: dependency
    note: "Circle CCTP v2 (native USDC burn-and-mint via TokenMinterV2). Routes USDC to Base, Arbitrum, Optimism. Verified onchain from vault USDC flows."
  - id: morpho
    label: Morpho Lending Markets
    category: dependency
    note: Multi-chain USDC lending markets (Ethereum, Base, Arbitrum, Optimism)

edges:
  # === Governance: multisig → timelock ===
  - from: gauntlet-multisig
    to: timelock-vault
    kind: proposes-on
    label: PROPOSER_ROLE + EXECUTOR_ROLE

  # === Governance: timelocks control their owned contracts ===
  - from: timelock-vault
    to: gtusda-vault
    kind: controls
    label: owner
  - from: timelock-vault
    to: provisioner
    kind: controls
    label: owner
  - from: timelock-vault
    to: roles-authority-vault
    kind: controls
    label: owner
  - from: timelock-vault
    to: forwarder-accountant
    kind: controls
    label: owner
  - from: timelock-feecalc
    to: price-fee-calculator
    kind: controls
    label: owner
  - from: timelock-feecalc
    to: roles-authority-feecalc
    kind: controls
    label: owner

  # === Mint authority ===
  - from: provisioner
    to: gtusda-vault
    kind: mints
    label: onlyProvisioner

  # === PPS authority: keeper → Forwarder → guard / PriceAndFeeCalculator ===
  - from: keeper-eoa
    to: forwarder-accountant
    kind: routes-through
    label: submit PPS
  - from: forwarder-accountant
    to: min-update-guard
    kind: routes-through
    label: pre-check interval
  - from: forwarder-accountant
    to: price-fee-calculator
    kind: holds-role
    label: vaultAccountant / setUnitPrice
  - from: price-fee-calculator
    to: gtusda-vault
    kind: manages
    label: unit price

  # === Capital flow: vault → bridge → Morpho ===
  - from: gtusda-vault
    to: cross-chain-bridge
    kind: routes-through
  - from: cross-chain-bridge
    to: morpho
    kind: deposits-into
    label: USDC

  # === Fee flow ===
  - from: gtusda-vault
    to: gauntlet-multisig
    kind: routes-fees-to
    label: feeRecipient
