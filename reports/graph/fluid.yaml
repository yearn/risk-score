slug: fluid
title: Fluid Lending Protocol (fTokens) — Contract Dependency Graph
chain: ethereum

categories:
  - id: vault
    label: fToken / Vault
  - id: strategy
    label: Strategy / Market
  - id: governance
    label: Governance
  - id: infra
    label: Protocol Infra
  - id: dependency
    label: External Dependency

nodes:
  # === fToken layer (user-facing) ===
  - id: fUSDC
    label: fUSDC (~$134M)
    address: "0x9Fb7b4477576Fe5B32be4C1843aFB1e55F251B33"
    category: vault
    note: ERC-4626 USDC lending vault
  - id: fUSDT
    label: fUSDT (~$131M)
    address: "0x5C20B550819128074FD538Edf79791733ccEdd18"
    category: vault
  - id: fWETH
    label: fWETH (~1,600 WETH)
    address: "0x90551c1795392094FE6D29B758EcCD233cFAa260"
    category: vault
  - id: fwstETH
    label: fwstETH (~360 wstETH)
    address: "0x2411802D8BEA09be0aF8fD8D08314a63e706b29C"
    category: vault
  - id: fGHO
    label: fGHO (~$15M)
    address: "0x6A29A46E21C730DcA1d8b23d637c101cec605C5B"
    category: vault
  - id: fsUSDS
    label: fsUSDS
    address: "0x2BBE31d63E6813E3AC858C04dae43FB2a72B0D11"
    category: vault
  - id: fUSDtb
    label: fUSDtb
    address: "0x15e8c742614b5D8Db4083A41Df1A14F5D2bFB400"
    category: vault

  # === Core infra ===
  - id: liquidity-layer
    label: Liquidity Layer (Infinite Proxy)
    address: "0x52Aa899454998Be5b000Ad077a46Bbe360F4e497"
    category: infra
    note: Holds ALL deposits across lending / vaults / DEX / stETH
  - id: liquidity-impl
    label: Liquidity Layer Impl (Mar 31 2026)
    address: "0xcc331DaF69752Bece3Dc98DBc63EacD5092266a2"
    category: infra
    note: Current dummy impl; module-dispatch lives in module slots
  - id: lending-factory
    label: LendingFactory
    address: "0x54B91A0D94cb471F37f949c60F7Fa7935b551D03"
    category: infra
    note: Deploys fToken contracts
  - id: vault-protocol
    label: Vault Protocol (Borrowers)
    category: infra
    note: Tick-based liquidations; generates fToken yield
  - id: rebalancer
    label: Rebalancer (fUSDC/fUSDT)
    address: "0x264786EF916af64a1DB19F513F24a3681734ce92"
    category: infra
    note: Deposits underlying as rewards; cannot withdraw

  # === Governance ===
  - id: fluid-token
    label: FLUID Governance Token
    address: "0x6f40d4A6237C257fff2dB00FA0510DeEECd303eb"
    category: governance
    note: 100M max supply; 4M quorum, 1M propose
  - id: governor-bravo
    label: GovernorBravo (135 proposals)
    address: "0x0204Cd037B2ec03605CFdFe482D8e257C765fA1B"
    category: governance
    note: 1d delay, 2d voting; 127 of 135 executed (3 Canceled, 3 Defeated, 2 Expired)
  - id: timelock
    label: Timelock (1-day delay)
    address: "0x2386DC45AdDed673317eF068992F19421B481F4c"
    category: governance
    note: Admin of all core contracts
  - id: avocado-guardian
    label: Avocado Guardian (7-of-14)
    address: "0x4F6F977aCDD1177DCD81aB83074855EcB9C2D49e"
    category: governance
    note: Pause Class-0 only; can cancel timelock txns

  # === Top borrow markets driving fToken yield ===
  - id: borrow-eth
    label: ETH/LST Borrow Markets
    category: strategy
    note: Top Eth-supply collateral group (~45%)
  - id: borrow-stable-wrappers
    label: Yield-Bearing Stable Wrappers
    category: strategy
    note: SUSDAI / reUSD / sUSDe — wrap-ratio amplification risk
  - id: borrow-btc
    label: BTC Borrow Markets
    category: strategy
    note: WBTC / cbBTC (~9% of Eth supply)
  - id: borrow-stables
    label: Stablecoin Borrow Markets
    category: strategy
    note: USDC / USDT / GHO; high utilization (>85%)

  # === External dependencies ===
  - id: dep-susdai
    label: Canonical sUSDai (Arbitrum)
    address: "0x0b2b2b2076d95dda7817e785989fe353fe955ef9"
    chain: arbitrum
    category: dependency
    note: USD.AI ERC-4626 vault backed by USDai; source-chain asset behind the cross-chain position; Fluid holds ~2/3 of total sUSDai supply
  - id: susdai-ethereum
    label: Ethereum sUSDai OToken
    address: "0x0b2b2b2076d95dda7817e785989fe353fe955ef9"
    category: dependency
    note: Bridged representation, not an ERC-4626 vault; Fluid held ~96% of mainnet supply when checked Jul 22, 2026
  - id: susdai-oadapter
    label: sUSDai OAdapter
    address: "0xffB20098FD7B8E84762eea4609F299D101427f24"
    category: infra
    note: Sole BRIDGE_ADMIN_ROLE holder on Ethereum sUSDai; LayerZero adapter with privileged mint and burn authority
  - id: susdai-admin-safe
    label: USD.AI Admin Safe (3-of-3)
    address: "0x5F0BC72FB5952b2f3F2E11404398eD507B25841F"
    category: governance
    note: Owns OAdapter and holds Ethereum sUSDai DEFAULT_ADMIN_ROLE
  - id: susdai-upgrade-timelock
    label: sUSDai Upgrade Timelock (48h)
    address: "0x0EEA1EE08611fF4A4E83BFe3916712751995639b"
    category: governance
    note: Owns ProxyAdmin 0x0b3296b6f50611B28d466a6D5A49754dAd4D8d9F, which can upgrade the Ethereum sUSDai proxy
  - id: dep-reusd
    label: reUSD (3.51 Elevated Risk)
    address: "0x5086bf358635B81D8C47C66d1C8b9E567Db70c72"
    category: dependency
    note: 6.1% of Fluid TVL (~26.7% of reUSD supply); ~50% offchain backing, admin-written price, EOA custody, no bug bounty
    ref: reports/report/re-reusd.md
  - id: dep-wsteth
    label: wstETH (Lido)
    address: "0x7f39C581F595B53c5cb19bD0b3f8dA6c935E2Ca0"
    category: dependency
    note: 20.8% of all-chain supply
  - id: dep-weeth
    label: weETH (ether.fi)
    category: dependency
    note: 3.2% of all-chain supply (was 12.9%)
  - id: dep-wbtc
    label: WBTC / cbBTC
    category: dependency
  - id: dep-chainlink
    label: Chainlink Oracles
    category: dependency
    note: Primary price feeds for liquidations
  - id: dep-permit2
    label: Uniswap Permit2
    address: "0x000000000022D473030F116dDEE9F6B43aC78BA3"
    category: dependency
    note: Deposit signatures

edges:
  # === Governance ===
  - from: fluid-token
    to: governor-bravo
    kind: controls
    label: token-holder voting
  - from: governor-bravo
    to: timelock
    kind: proposes-on
    label: queue / execute
  - from: avocado-guardian
    to: timelock
    kind: cancels-on
    label: cancel queued txns
  - from: timelock
    to: liquidity-layer
    kind: controls
    label: EIP-1967 admin (upgrade impl)
  - from: timelock
    to: lending-factory
    kind: controls
    label: owner
  - from: avocado-guardian
    to: liquidity-layer
    kind: holds-role
    label: pause Class-0

  # === Proxy / deployment wiring ===
  - from: liquidity-impl
    to: liquidity-layer
    kind: manages
    label: dummy impl (since Mar 31 2026)
  - from: lending-factory
    to: fUSDC
    kind: deploys
  - from: lending-factory
    to: fUSDT
    kind: deploys
  - from: lending-factory
    to: fWETH
    kind: deploys
  - from: lending-factory
    to: fwstETH
    kind: deploys
  - from: lending-factory
    to: fGHO
    kind: deploys
  - from: lending-factory
    to: fsUSDS
    kind: deploys
  - from: lending-factory
    to: fUSDtb
    kind: deploys
  - from: rebalancer
    to: fUSDC
    kind: manages
    label: deposits as rewards
  - from: rebalancer
    to: fUSDT
    kind: manages
    label: deposits as rewards

  # === fToken flow: deposits into shared Liquidity Layer ===
  - from: fUSDC
    to: liquidity-layer
    kind: deposits-into
    label: "USDC supply"
  - from: fUSDT
    to: liquidity-layer
    kind: deposits-into
    label: "USDT supply"
  - from: fWETH
    to: liquidity-layer
    kind: deposits-into
    label: "WETH supply"
  - from: fwstETH
    to: liquidity-layer
    kind: deposits-into
    label: "wstETH supply"
  - from: fGHO
    to: liquidity-layer
    kind: deposits-into
    label: "GHO supply"
  - from: fsUSDS
    to: liquidity-layer
    kind: deposits-into
    label: "sUSDS supply"
  - from: fUSDtb
    to: liquidity-layer
    kind: deposits-into
    label: "USDtb supply"

  # === Yield: Liquidity Layer lends to Vault Protocol borrow markets ===
  - from: liquidity-layer
    to: vault-protocol
    kind: routes-through
    label: shared borrow pool
  - from: vault-protocol
    to: borrow-eth
    kind: allocates-to
    label: "~45% Eth supply"
  - from: vault-protocol
    to: borrow-stable-wrappers
    kind: allocates-to
    label: "~37% (SUSDAI + reUSD)"
  - from: vault-protocol
    to: borrow-btc
    kind: allocates-to
    label: "~9% Eth supply"
  - from: vault-protocol
    to: borrow-stables
    kind: allocates-to
    label: "~13% Eth supply"

  # === Borrow markets → collateral / external dependencies ===
  - from: borrow-stable-wrappers
    to: dep-susdai
    kind: deposits-into
    label: "31.2% cross-chain (USD.AI)"
  - from: borrow-stable-wrappers
    to: susdai-ethereum
    kind: deposits-into
    label: "15.2% of Ethereum supply"
  - from: susdai-ethereum
    to: dep-susdai
    kind: routes-through
    label: bridged claim on canonical Arbitrum sUSDai
  - from: susdai-oadapter
    to: susdai-ethereum
    kind: mints
    label: BRIDGE_ADMIN_ROLE
  - from: susdai-admin-safe
    to: susdai-oadapter
    kind: controls
    label: owner
  - from: susdai-admin-safe
    to: susdai-ethereum
    kind: holds-role
    label: DEFAULT_ADMIN_ROLE
  - from: susdai-upgrade-timelock
    to: susdai-ethereum
    kind: controls
    label: owns ProxyAdmin; 48-hour delay
  - from: borrow-stable-wrappers
    to: dep-reusd
    kind: deposits-into
    label: "6.1%"
  - from: borrow-eth
    to: dep-wsteth
    kind: deposits-into
  - from: borrow-eth
    to: dep-weeth
    kind: deposits-into
  - from: borrow-btc
    to: dep-wbtc
    kind: deposits-into
  - from: vault-protocol
    to: dep-chainlink
    kind: routes-through
    label: liquidation oracle
  - from: liquidity-layer
    to: dep-permit2
    kind: routes-through
    label: deposit signatures
