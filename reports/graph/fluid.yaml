  - id: dep-permit2
    label: Uniswap Permit2
    address: "0x000000000022D473030F116dDEE9F6B43aC78BA3"
    category: dependency
    note: Deposit signatures

edges:
  # === Governance ===
  - from: fluid-token
    to: governor-bravo
    kind: controls
    label: token-holder voting
  - from: governor-bravo
    to: timelock
    kind: proposes-on
    label: queue / execute
  - from: avocado-guardian
    to: timelock
    kind: cancels-on
    label: cancel queued txns
  - from: timelock
    to: liquidity-layer
    kind: controls
    label: EIP-1967 admin (upgrade impl)
  - from: timelock
    to: lending-factory
    kind: controls
    label: owner
  - from: avocado-guardian
    to: liquidity-layer
    kind: holds-role
    label: pause Class-0

  # === Proxy / deployment wiring ===
  - from: liquidity-impl
    to: liquidity-layer
    kind: manages
    label: dummy impl (since Mar 31 2026)
  - from: lending-factory
    to: fUSDC
    kind: deploys
  - from: lending-factory
    to: fUSDT
    kind: deploys
  - from: lending-factory
    to: fWETH
    kind: deploys
  - from: lending-factory
    to: fwstETH
    kind: deploys
  - from: lending-factory
    to: fGHO
    kind: deploys
  - from: lending-factory
    to: fsUSDS
    kind: deploys
  - from: lending-factory
    to: fUSDtb
    kind: deploys
  - from: rebalancer
    to: fUSDC
    kind: manages
    label: deposits as rewards
  - from: rebalancer
    to: fUSDT
    kind: manages
    label: deposits as rewards

