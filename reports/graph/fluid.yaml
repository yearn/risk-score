    label: "~45% Eth supply"
  - from: vault-protocol
    to: borrow-stable-wrappers
    kind: allocates-to
    label: "~32% (SUSDAI + reUSD)"
  - from: vault-protocol
    to: borrow-btc
    kind: allocates-to
    label: "~10% Eth supply"
  - from: vault-protocol
    to: borrow-stables
    kind: allocates-to
