  - from: fUSDC
    to: liquidity-layer
    kind: deposits-into
    label: "USDC supply"
  - from: fUSDT
    to: liquidity-layer
    kind: deposits-into
    label: "USDT supply"
  - from: fWETH
    to: liquidity-layer
    kind: deposits-into
    label: "WETH supply"
  - from: fwstETH
    to: liquidity-layer
    kind: deposits-into
    label: "wstETH supply"
  - from: fGHO
    to: liquidity-layer
    kind: deposits-into
    label: "GHO supply"
  - from: fsUSDS
    to: liquidity-layer
    kind: deposits-into
    label: "sUSDS supply"
  - from: fUSDtb
    to: liquidity-layer
    kind: deposits-into
