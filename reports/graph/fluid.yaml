  - id: dep-weeth
    label: weETH (ether.fi)
    category: dependency
    note: 12.9% of all-chain supply
  - id: dep-wbtc
    label: WBTC / cbBTC
    category: dependency
  - id: dep-chainlink
    label: Chainlink Oracles
    category: dependency
