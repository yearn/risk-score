edges:
  # === Governance flow: xOGN → Origin Gov → Timelock → ARM ===
  - from: xogn
    to: origin-gov
    kind: controls
    label: voting token
  - from: origin-gov
    to: timelock
    kind: proposes-on
    label: PROPOSER + EXECUTOR + CANCELLER
  - from: gov-multisig
    to: timelock
    kind: cancels-on
    label: CANCELLER only
  - from: timelock
    to: arm
    kind: controls
    label: owner (upgrade, setCrossPrice, setFee, setOperator)
  - from: timelock
    to: morpho-wrapper
    kind: controls
    label: owner

  # === Operator role on vault (no timelock) ===
  - from: operator
    to: arm
    kind: holds-role
    label: operator (setPrices, requestLidoWithdrawals, setActiveMarket)

  # === Vault internal wiring ===
  - from: arm-impl
    to: arm
    kind: manages
    label: EIP-1967 implementation
  - from: arm
    to: fee-collector
    kind: routes-fees-to
    label: 20% performance fee

  # === Capital flow: ARM → strategies → external dependencies ===
  - from: arm
    to: lido-wq
    kind: deposits-into
    label: ~99% (request → claim 1-3d)
  - from: arm
    to: morpho-wrapper
    kind: allocates-to
    label: idle WETH buffer
  - from: morpho-wrapper
    to: morpho-vault
    kind: deposits-into
    label: WETH supply
  - from: morpho-vault
    to: harvester
    kind: routes-fees-to
    label: MORPHO rewards

  # === Secondary liquidity ===
  - from: arm
    to: curve-pool
    kind: routes-through
    label: secondary DEX exit
