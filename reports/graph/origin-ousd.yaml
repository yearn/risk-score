edges:
  # === Governance flow: xOGN → Origin Gov → Timelock → Vault ===
  - from: xogn
    to: origin-gov
    kind: controls
    label: voting token
  - from: origin-gov
    to: timelock
    kind: proposes-on
    label: PROPOSER + EXECUTOR + CANCELLER
  - from: gov-multisig
    to: timelock
    kind: cancels-on
    label: CANCELLER only
  - from: timelock
    to: vault
    kind: controls
    label: governor (upgrade, approveStrategy, setTrusteeFeeBps, ...)
  - from: timelock
    to: ousd-token
    kind: controls
    label: governor (governanceRebaseOptIn)

  # === Strategist roles (untimelocked) ===
  - from: strategist
    to: vault
    kind: holds-role
    label: "strategistAddr (deposit/withdraw strategy, AMO, vault params, pause)"
  - from: strategist
    to: ousd-token
    kind: holds-role
    label: "delegateYield / undelegateYield (any account)"
  - from: strategist
    to: amo-strategy
    kind: controls
    label: "operator (mintAndAdd / removeAndBurn / harvest)"

  # === Proxy implementations ===
  - from: ousd-impl
    to: ousd-token
    kind: manages
    label: EIP-1967 implementation
  - from: vault-impl
    to: vault
    kind: manages
    label: EIP-1967 implementation

  # === Internal vault wiring ===
  - from: oracle
    to: vault
    kind: routes-through
    label: Chainlink USDC/USD price
  - from: vault
    to: trustee
    kind: routes-fees-to
    label: 20% performance fee

  # === Mint authority: AMO is the only mint-whitelisted strategy ===
  - from: amo-strategy
    to: ousd-token
    kind: mints
    label: "mintForStrategy whitelisted; 99.8% solvency check"

  # === wOUSD wrapper ===
  - from: wousd
    to: ousd-token
    kind: deposits-into
    label: ERC-4626 wrap

  # === Allocation fan: vault → strategies ===
  - from: vault
    to: morpho-strategy
    kind: allocates-to
    label: "44.8%"
  - from: vault
    to: amo-strategy
    kind: allocates-to
    label: "13.7%"
  - from: vault
    to: cc-base
    kind: allocates-to
    label: "28.4%"
  - from: vault
    to: cc-hyperevm
    kind: allocates-to
    label: "13.2%"

  # === Strategies → external dependencies ===
  - from: morpho-strategy
    to: morphousd-vault
    kind: deposits-into
    label: USDC supply
  - from: amo-strategy
    to: curve-gauge
    kind: deposits-into
    label: "stake Curve LP"
  - from: curve-gauge
    to: curve-pool
    kind: routes-through
    label: "claim CRV → CoW swap"

  # === Cross-chain bridges ===
  - from: cc-base
    to: cctp-base
    kind: routes-through
    label: "CCTP V2 bridge"
  - from: cc-hyperevm
    to: cctp-hyperevm
    kind: routes-through
    label: "CCTP V2 bridge"

  # === Reward harvesting fan-in ===
  - from: morphousd-vault
    to: cow-harvester
    kind: routes-fees-to
    label: MORPHO rewards
  - from: curve-gauge
    to: cow-harvester
    kind: routes-fees-to
    label: CRV rewards
  - from: cow-harvester
    to: vault
    kind: routes-fees-to
    label: USDC

  # === Secondary liquidity ===
  - from: vault
    to: curve-pool
    kind: routes-through
    label: "secondary DEX exit"
