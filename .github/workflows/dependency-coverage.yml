name: Dependency Coverage

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'reports/report/**'
      - 'scripts/dependencies/protocols.yaml'
      - 'scripts/check_dependency_coverage.py'
      - 'tests/test_check_dependency_coverage.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    # Skip draft PRs — they iterate a lot. Runs once the PR is marked ready.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Unit tests for the coverage check
        run: uv run python -m unittest tests.test_check_dependency_coverage

      - name: Assert reports and protocols.yaml are in sync
        run: uv run scripts/check_dependency_coverage.py
