name: Report Issue
description: Report an issue with an existing risk assessment report
title: "Report Issue: "
labels: ["report-issue"]
body:
  - type: markdown
    attributes:
      value: |
        Found an issue with one of our risk assessment reports? Let us know so we can fix it.

  - type: input
    id: report-name
    attributes:
      label: Report Name
      description: The name of the report you found an issue with.
      placeholder: e.g., Lido wstETH
    validations:
      required: true

  - type: input
    id: report-link
    attributes:
      label: Report Link
      description: Link to the report on the site or GitHub.
      placeholder: https://risk.yearn.farm/report/lido-wsteth
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Issue Description
      description: Describe what is wrong or outdated in the report.
      placeholder: |
        e.g., The audit section references an outdated audit from 2023,
        but there is a newer audit from 2024 that should be included.
    validations:
      required: true
